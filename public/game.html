<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RoRo Hide &amp; Seek</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div id="statusBar"><span id="phaseText"></span><span id="chancesText"></span></div>
    <div id="joystickZone">
      <div id="joystickBase"><div id="joystickKnob"></div></div>
    </div>
    <div id="hideZone"><button id="hideBtn">HIDE</button></div>
    <div id="blindfold" class="hidden">
      <div id="blindfoldInner">Hiders are hiding...<br><span id="bfTimer"></span></div>
    </div>
  </div>

  <div id="gameOverScreen" class="hidden">
    <h1 id="winnerText"></h1>
    <button id="btnAgain">Play Again</button>
  </div>

  <div id="toast" class="hidden"></div>

  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
  </script>
  <script type="module" src="/game.js"></script>
</body>
</html>
