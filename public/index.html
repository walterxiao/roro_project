<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RoRo Hide &amp; Seek</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E%F0%9F%A7%9A%3C/text%3E%3C/svg%3E">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#1a1a2e; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; }

    /* Lobby */
    #lobby { display:flex; flex-direction:column; align-items:center; gap:18px; }
    #lobby h1 { font-size:32px; } #lobby h2 { font-size:18px; color:#aaa; font-weight:400; }
    #lobby input { padding:12px 18px; font-size:16px; border-radius:8px; border:none; width:220px; text-align:center; }
    .role-row { display:flex; gap:12px; }
    .role-btn { padding:14px 28px; font-size:16px; font-weight:700; border:2px solid #555; background:#222; color:#fff; border-radius:8px; cursor:pointer; }
    .role-btn.seeker-on { border-color:#f55; background:#411; }
    .role-btn.hider-on { border-color:#4c4; background:#142; }
    .map-btn { padding:8px 16px; font-size:14px; border:2px solid #555; background:#222; color:#fff; border-radius:6px; cursor:pointer; }
    .map-btn.active { border-color:#2a7; background:#142; }
    .map-btn:disabled { opacity:0.5; cursor:default; }
    #players { min-height:40px; text-align:center; color:#aaa; line-height:1.8; font-size:14px; }
    #startBtn { padding:16px 40px; font-size:20px; font-weight:700; border:none; border-radius:12px; background:#2a7; color:#fff; cursor:pointer; }
    #startBtn:disabled { background:#333; color:#666; cursor:default; }
    #status { color:#ff0; font-size:14px; min-height:20px; }
    #hubLink { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); color:#aaa; font-size:14px; text-decoration:none; padding:8px 14px; border:1px solid #444; border-radius:8px; background:rgba(0,0,0,0.3); }
    #hubLink:hover { color:#fff; border-color:#888; }

    #browser, #inGame { display:flex; flex-direction:column; align-items:center; gap:14px; }
    .big-btn { padding:14px 30px; font-size:18px; font-weight:700; border:none; border-radius:10px; background:#2a7; color:#fff; cursor:pointer; }
    .secondary-btn { padding:10px 24px; font-size:14px; font-weight:600; border:1px solid #844; border-radius:8px; background:#400; color:#fcc; cursor:pointer; }
    .secondary-btn:hover { background:#600; }
    #browserLabel { color:#aaa; font-size:13px; margin-top:8px; }
    #gameList { display:flex; flex-direction:column; gap:8px; width:300px; min-height:60px; }
    .game-card { padding:12px 16px; background:#222; border:1px solid #444; border-radius:8px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .game-card .info { color:#ccc; font-size:14px; line-height:1.4; text-align:left; }
    .game-card .info .sub { color:#888; font-size:12px; }
    .game-card button { padding:8px 14px; font-size:14px; border:none; border-radius:6px; background:#2a7; color:#fff; cursor:pointer; }
    #gameList .empty { color:#666; font-size:13px; padding:10px; text-align:center; }
    #gameHeader { color:#aaa; font-size:13px; text-align:center; line-height:1.5; }

    /* Game (hidden until started) */
    #gameWrap { display:none; width:100%; height:100%; position:fixed; inset:0; }
    #gameWrap.active { display:block; }
  </style>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- LOBBY -->
  <div id="lobby">
    <h1>RoRo Hide &amp; Seek</h1>
    <h2>Multiplayer</h2>
    <input type="text" id="nameInput" placeholder="Enter your name" maxlength="16">

    <!-- Browser view: list of games + create button -->
    <div id="browser">
      <button id="createGameBtn" class="big-btn">Create a new game</button>
      <div id="browserLabel">Or join an existing game:</div>
      <div id="gameList"></div>
    </div>

    <!-- In-game lobby view -->
    <div id="inGame" style="display:none;">
      <div id="gameHeader"></div>
      <div id="mapSelector" style="display:flex; gap:10px; align-items:center;">
        <span style="color:#aaa; font-size:14px;">Map:</span>
        <button class="map-btn" id="mapHome" data-map="home">Home</button>
        <button class="map-btn" id="mapLibrary" data-map="library">Library</button>
        <button class="map-btn" id="mapCruise" data-map="cruise">Cruise</button>
      </div>
      <div id="mapInfo" style="color:#aaa; font-size:13px;"></div>
      <div id="players"></div>
      <button id="startBtn" disabled>I am ready</button>
      <button id="leaveGameBtn" class="secondary-btn">Leave game</button>
    </div>

    <div id="status"></div>
    <a id="hubLink" href="http://xiaogamehub.com">&larr; Back to GameHub</a>
  </div>

  <!-- Wheel overlay -->
  <div id="wheelOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:500; flex-direction:column; align-items:center; justify-content:center; gap:20px;">
    <h2 style="color:#fff; font-size:20px;">Spinning the wheel...</h2>
    <div id="wheelName" style="font-size:48px; font-weight:800; color:#ff0; padding:20px 40px; border:4px solid #ff0; border-radius:16px; min-width:260px; text-align:center; transition:transform .2s;"></div>
    <div id="wheelResult" style="color:#0f0; font-size:24px; font-weight:700; min-height:30px;"></div>
  </div>

  <!-- GAME CONTAINER (hidden until game starts) -->
  <div id="gameWrap">
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
      <div id="statusBar"><span id="phaseText"></span><span id="chancesText"></span></div>
      <div id="joystickZone"><div id="joystickBase"><div id="joystickKnob"></div></div></div>
      <div id="hideZone"><button id="hideBtn">HIDE</button></div>
      <div id="blindfold" class="hidden"><div id="blindfoldInner">Waiting for hiders to hide<span id="bfTimer"></span></div></div>
    </div>
    <div id="gameOverScreen" class="hidden"><h1 id="winnerText"></h1><div id="gameOverSubtitle" style="color:#aaa; font-size:14px;"></div></div>
    <div id="toast" class="hidden"></div>
  </div>

  <script>
    // ===== LOBBY LOGIC (plain JS, no modules) =====
    const lobby = document.getElementById('lobby');
    const gameWrap = document.getElementById('gameWrap');
    const nameInput = document.getElementById('nameInput');
    const startBtn = document.getElementById('startBtn');
    const playersDiv = document.getElementById('players');
    const statusDiv = document.getElementById('status');
    const wheelOverlay = document.getElementById('wheelOverlay');
    const wheelName = document.getElementById('wheelName');
    const wheelResult = document.getElementById('wheelResult');
    const browserDiv = document.getElementById('browser');
    const inGameDiv = document.getElementById('inGame');
    const gameListDiv = document.getElementById('gameList');
    const gameHeader = document.getElementById('gameHeader');
    const createGameBtn = document.getElementById('createGameBtn');
    const leaveGameBtn = document.getElementById('leaveGameBtn');

    let ws, myId = null, myRole = null, gameStarted = false;
    let currentPlayers = [];
    let currentMap = 'home';
    let hostId = null;
    let myGameId = null;

    // Restore name
    const savedName = sessionStorage.getItem('roroName');
    if (savedName) nameInput.value = savedName;

    function wsSend(msg) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg)); }

    window.__roro = { getWs: () => ws, getId: () => myId, getRole: () => myRole, getPlayers: () => currentPlayers, getMap: () => currentMap, send: wsSend };
    window.__roroBuffer = [];

    function showBrowser() {
      browserDiv.style.display = 'flex';
      inGameDiv.style.display = 'none';
    }
    function showInGame() {
      browserDiv.style.display = 'none';
      inGameDiv.style.display = 'flex';
    }

    function renderGameList(list) {
      if (!list.length) { gameListDiv.innerHTML = '<div class="empty">No games yet. Create one!</div>'; return; }
      gameListDiv.innerHTML = list.map(g => `
        <div class="game-card">
          <div class="info">
            <div>${escapeHtml(g.hostName)}'s game</div>
            <div class="sub">${g.playerCount} player${g.playerCount !== 1 ? 's' : ''} · ${g.map}</div>
          </div>
          <button data-gid="${g.id}">Join</button>
        </div>
      `).join('');
      gameListDiv.querySelectorAll('button[data-gid]').forEach(btn => {
        btn.addEventListener('click', () => wsSend({ type: 'joinGame', gameId: btn.getAttribute('data-gid') }));
      });
    }
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host);
      ws.onopen = () => {
        statusDiv.textContent = 'Connected!';
        const name = nameInput.value.trim();
        if (name) wsSend({ type: 'setName', name });
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'welcome') {
          myId = msg.id;
          renderGameList(msg.games || []);
          showBrowser();
        }
        if (msg.type === 'gameList') {
          renderGameList(msg.games || []);
        }
        if (msg.type === 'gameJoined') {
          myGameId = msg.game.id;
          hostId = msg.game.hostId;
          currentMap = msg.game.map;
          updatePlayers(msg.game.players);
          gameHeader.textContent = `Game ${msg.game.id}`;
          showInGame();
          updateMapUI();
        }
        if (msg.type === 'gameLeft') {
          myGameId = null;
          myRole = null;
          hostId = null;
          currentPlayers = [];
          showBrowser();
        }
        if (msg.type === 'joinFailed') {
          statusDiv.textContent = msg.reason || 'Failed to join';
          setTimeout(() => { statusDiv.textContent = ''; }, 3000);
        }
        if (msg.type === 'allPlayers') {
          if (msg.hostId != null) hostId = msg.hostId;
          updatePlayers(msg.players);
          updateMapUI();
        }
        if (msg.type === 'mapChanged') {
          currentMap = msg.map;
          updateMapUI();
        }
        if (msg.type === 'wheelSpin') startWheel(msg.players, msg.seekerId, msg.duration);
        if (msg.type === 'phaseChange') {
          if (msg.phase === 'hiding' && !gameStarted) {
            const meInList = currentPlayers.some(p => p.id === myId && p.role);
            if (meInList) launchGame();
          }
        }
        if (msg.type === 'reset') { window.location.reload(); return; }

        if (window.__roroOnMsg) window.__roroOnMsg(msg);
        else window.__roroBuffer.push(msg);
      };
      ws.onerror = () => { statusDiv.textContent = 'Connection error...'; };
      ws.onclose = () => { statusDiv.textContent = 'Reconnecting...'; setTimeout(connect, 2000); };
    }

    function updatePlayers(list) {
      currentPlayers = list;
      let me = null;
      playersDiv.innerHTML = list.map(p => {
        if (p.id === myId && p.role) myRole = p.role;
        if (p.id === myId) me = p;
        const tag = p.ready ? ' ✓' : '';
        const host = p.id === hostId ? ' (host)' : '';
        return p.name + (p.id === myId ? ' (you)' : '') + host + tag;
      }).join('<br>');
      const minPlayers = (new URLSearchParams(window.location.search).get('debug') === 'true') ? 1 : 2;
      startBtn.disabled = list.length < minPlayers;
      if (me && me.ready) {
        startBtn.textContent = 'Waiting for others...';
        startBtn.style.background = '#555';
      } else {
        startBtn.textContent = 'I am ready';
        startBtn.style.background = '#2a7';
      }
    }

    function startWheel(players, seekerId, duration) {
      wheelOverlay.style.display = 'flex';
      wheelResult.textContent = '';
      wheelName.style.transform = 'scale(1)';
      wheelName.style.transition = 'transform .15s ease-out, background-color .15s';
      const names = players.map(p => p.name);
      const seekerIdx = players.findIndex(p => p.id === seekerId);
      const seekerName = names[seekerIdx] || '?';

      // How many total steps should we cycle through before landing?
      // Use easeOutQuint so it decelerates smoothly
      const totalCycles = 4; // full loops before settling
      const totalSteps = totalCycles * names.length + seekerIdx + names.length * 2;
      const start = performance.now();
      let lastShownStep = -1;

      function easeOutQuint(t) { return 1 - Math.pow(1 - t, 5); }

      function tick(now) {
        const t = Math.min(1, (now - start) / duration);
        // progress maps 0→0 and 1→totalSteps with easing
        const progress = easeOutQuint(t);
        const step = Math.floor(progress * totalSteps);
        if (step !== lastShownStep) {
          lastShownStep = step;
          const idx = step % names.length;
          wheelName.textContent = names[idx];
          // Pulse effect on each change — more intense earlier, gentle near end
          const pulse = 1.0 + (1 - t) * 0.2;
          wheelName.style.transform = `scale(${pulse})`;
          // Color flash earlier, settle near end
          wheelName.style.backgroundColor = `rgba(255, 255, 0, ${0.05 + (1 - t) * 0.15})`;
        }
        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          // Landed — final glow
          wheelName.textContent = seekerName;
          wheelName.style.transform = 'scale(1.35)';
          wheelName.style.backgroundColor = 'rgba(255, 255, 0, 0.3)';
          wheelResult.textContent = seekerName + ' is the SEEKER!';
          setTimeout(() => {
            wheelOverlay.style.display = 'none';
            wheelName.style.transform = 'scale(1)';
            wheelName.style.backgroundColor = '';
          }, 1500);
        }
      }
      requestAnimationFrame(tick);
    }

    function launchGame() {
      gameStarted = true;
      lobby.style.display = 'none';
      document.body.style.background = '#000';
      gameWrap.classList.add('active');
      // Dynamically load game module (only once)
      if (!document.getElementById('gameScript')) {
        const im = document.createElement('script');
        im.type = 'importmap';
        im.textContent = JSON.stringify({ imports: { three: 'https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js' } });
        document.head.appendChild(im);
        const sc = document.createElement('script');
        sc.type = 'module'; sc.src = '/game.js'; sc.id = 'gameScript';
        document.body.appendChild(sc);
      }
    }

    nameInput.addEventListener('input', () => {
      const n = nameInput.value.trim();
      sessionStorage.setItem('roroName', n);
      wsSend({ type: 'setName', name: n });
    });
    // Parse debug mode from query string (?debug=true&role=seeker|hider)
    const urlParams = new URLSearchParams(window.location.search);
    const debugMode = urlParams.get('debug') === 'true';
    const debugRole = urlParams.get('role') === 'hider' ? 'hider' : 'seeker';
    if (debugMode) {
      statusDiv.textContent = 'DEBUG MODE — solo play as ' + debugRole;
      statusDiv.style.color = '#f80';
    }

    startBtn.addEventListener('click', () => {
      wsSend({ type: 'ready', debug: debugMode, debugRole });
    });
    createGameBtn.addEventListener('click', () => wsSend({ type: 'createGame' }));
    leaveGameBtn.addEventListener('click', () => wsSend({ type: 'leaveGame' }));

    const mapHomeBtn = document.getElementById('mapHome');
    const mapLibraryBtn = document.getElementById('mapLibrary');
    const mapCruiseBtn = document.getElementById('mapCruise');
    const mapInfo = document.getElementById('mapInfo');
    function updateMapUI() {
      mapHomeBtn.classList.toggle('active', currentMap === 'home');
      mapLibraryBtn.classList.toggle('active', currentMap === 'library');
      mapCruiseBtn.classList.toggle('active', currentMap === 'cruise');
      const isHost = hostId === myId;
      mapHomeBtn.disabled = !isHost;
      mapLibraryBtn.disabled = !isHost;
      mapCruiseBtn.disabled = !isHost;
      mapInfo.textContent = isHost ? '(You choose the map)' : 'Host picks the map';
    }
    mapHomeBtn.addEventListener('click', () => { if (hostId === myId) wsSend({ type: 'setMap', map: 'home' }); });
    mapLibraryBtn.addEventListener('click', () => { if (hostId === myId) wsSend({ type: 'setMap', map: 'library' }); });
    mapCruiseBtn.addEventListener('click', () => { if (hostId === myId) wsSend({ type: 'setMap', map: 'cruise' }); });

    connect();
  </script>
</body>
</html>
