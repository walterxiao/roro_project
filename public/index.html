<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RoRo Hide &amp; Seek</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#1a1a2e; color:#fff; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
    h1 { font-size:32px; }
    h2 { font-size:18px; color:#aaa; font-weight:400; }
    input { padding:12px 18px; font-size:16px; border-radius:8px; border:none; width:220px; text-align:center; }
    .role-row { display:flex; gap:12px; margin-top:4px; }
    .role-btn { padding:14px 28px; font-size:16px; font-weight:700; border:2px solid #555; background:#222; color:#fff; border-radius:8px; cursor:pointer; transition:all .2s; }
    .role-btn:hover { border-color:#888; }
    .role-btn.seeker-on { border-color:#f55; background:#411; }
    .role-btn.hider-on { border-color:#4c4; background:#142; }
    #players { min-height:50px; text-align:center; color:#aaa; line-height:1.8; font-size:14px; margin:4px 0; }
    #startBtn { padding:16px 40px; font-size:20px; font-weight:700; border:none; border-radius:12px; background:#2a7; color:#fff; cursor:pointer; transition:background .2s; }
    #startBtn:disabled { background:#333; color:#666; cursor:default; }
    #status { color:#ff0; font-size:14px; min-height:20px; }
  </style>
</head>
<body>
  <h1>RoRo Hide &amp; Seek</h1>
  <h2>Multiplayer</h2>
  <input type="text" id="nameInput" placeholder="Enter your name" maxlength="16">
  <div class="role-row">
    <button class="role-btn" id="seekerBtn">Seeker</button>
    <button class="role-btn" id="hiderBtn">Hider</button>
  </div>
  <div id="players"></div>
  <button id="startBtn" disabled>Start Game</button>
  <div id="status"></div>

  <script>
    const nameInput = document.getElementById('nameInput');
    const seekerBtn = document.getElementById('seekerBtn');
    const hiderBtn = document.getElementById('hiderBtn');
    const startBtn = document.getElementById('startBtn');
    const playersDiv = document.getElementById('players');
    const statusDiv = document.getElementById('status');

    let ws, myId = null, myRole = null;

    function send(msg) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg)); }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host);
      ws.onopen = () => {
        statusDiv.textContent = 'Connected!';
        const name = nameInput.value.trim();
        if (name) send({ type: 'setName', name });
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'welcome') {
          myId = msg.id;
          updatePlayers(msg.players);
          if (msg.phase !== 'lobby') {
            window.location.href = '/game.html';
          }
        }
        if (msg.type === 'allPlayers') updatePlayers(msg.players);
        if (msg.type === 'phaseChange' && msg.phase === 'hiding') {
          window.location.href = '/game.html';
        }
      };
      ws.onerror = () => { statusDiv.textContent = 'Connection error...'; };
      ws.onclose = () => { statusDiv.textContent = 'Disconnected. Reconnecting...'; setTimeout(connect, 2000); };
    }

    function updatePlayers(list) {
      let hasSeeker = false, hasHider = false;
      const lines = list.map(p => {
        const tag = p.id === myId ? ' (you)' : '';
        const role = p.role ? ' [' + p.role + ']' : '';
        if (p.role === 'seeker') hasSeeker = true;
        if (p.role === 'hider') hasHider = true;
        return p.name + role + tag;
      });
      playersDiv.innerHTML = lines.join('<br>');
      startBtn.disabled = !(hasSeeker && hasHider);
    }

    nameInput.addEventListener('input', () => send({ type: 'setName', name: nameInput.value.trim() }));

    seekerBtn.addEventListener('click', () => {
      send({ type: 'setRole', role: 'seeker' }); myRole = 'seeker';
      seekerBtn.classList.add('seeker-on'); hiderBtn.classList.remove('hider-on');
    });
    hiderBtn.addEventListener('click', () => {
      send({ type: 'setRole', role: 'hider' }); myRole = 'hider';
      hiderBtn.classList.add('hider-on'); seekerBtn.classList.remove('seeker-on');
    });

    startBtn.addEventListener('click', () => send({ type: 'startGame' }));

    connect();
  </script>
</body>
</html>
